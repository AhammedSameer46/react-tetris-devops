apiVersion: apps/v1
kind: Deployment

metadata:
  name: react-tetris-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: react-tetris

  template:
    metadata:
      labels:
        app: react-tetris

    spec:
      containers:
        - name: react-tetris
          image: ahammed46/react-tetris-devops:v1

          ports:
            - containerPort: 80